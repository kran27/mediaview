name: Publish Container

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to DHI
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_AUTH_USER }}
          password: ${{ secrets.DHI_AUTH_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image tag
        id: set_tag
        run: |
          echo "tag=$(date -u +%F)-${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "commit_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            VITE_APP_COMMIT_SHORT=${{ steps.set_tag.outputs.commit_short }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:${{ steps.set_tag.outputs.tag }}

      - name: GH Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: ${{ steps.set_tag.outputs.tag }}
          tag_name: ${{ steps.set_tag.outputs.tag }}
          make_latest: true
