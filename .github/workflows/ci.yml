name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client

  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: server

      - name: Install frontend deps
        run: npm ci
        working-directory: client

      - name: Build frontend (for server static serving)
        run: npm run build
        working-directory: client
